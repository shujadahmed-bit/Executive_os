// ─── AI Assistant ───
const AIAssistantView = () => {
  const [messages, setMessages] = useState(AI_MESSAGES);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  useEffect(scrollToBottom, [messages]);

  const handleSend = () => {
    if (!input.trim()) return;
    const userMsg = { id: Date.now(), role: 'user', content: input };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setIsTyping(true);

    setTimeout(() => {
      const responses = [
        "I have analyzed your tasks and created a prioritized plan for today. Your high-priority items are the API documentation review and the homepage hero section.",
        "Based on your project timeline, I suggest breaking down the Q3 launch into 3 sprints. Would you like me to create those tasks?",
        "I have summarized your last 3 meeting notes. Key takeaway: The team is aligned on the mobile-first approach for the redesign.",
        "I can see you have 2 overdue tasks. Would you like me to reschedule them or delegate to team members?",
      ];
      setMessages(prev => [...prev, { id: Date.now() + 1, role: 'assistant', content: responses[Math.floor(Math.random() * responses.length)] }]);
      setIsTyping(false);
    }, 1500);
  };

  const suggestions = ["Summarize my week", "Create tasks from meeting notes", "Prioritize my backlog", "Draft project plan for Q3"];

  return (
    <div className="flex flex-col h-full animate-fadeIn">
      <div className="h-14 flex items-center px-6 border-b border-border shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-accent/20 flex items-center justify-center"><I.Sparkles /></div>
          <div>
            <h1 className="text-sm font-semibold">AI Assistant</h1>
            <div className="flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-green-500 status-dot" />
              <span className="text-[11px] text-text-tertiary">Online</span>
            </div>
          </div>
        </div>
      </div>

      <div className="flex-1 overflow-auto p-6">
        <div className="max-w-3xl mx-auto space-y-6">
          {messages.map(msg => (
            <div key={msg.id} className={`flex gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
              <div className={`w-8 h-8 rounded-lg flex items-center justify-center shrink-0 ${msg.role === 'assistant' ? 'bg-accent/20' : 'bg-white/10'}`}>
                {msg.role === 'assistant' ? <I.Sparkles /> : <Avatar user="u1" size="sm" />}
              </div>
              <div className={`max-w-[80%] rounded-2xl px-5 py-3 text-sm leading-relaxed ${msg.role === 'assistant' ? 'bg-surface-elevated border border-border' : 'bg-accent text-white'}`}>
                {msg.content}
              </div>
            </div>
          ))}
          {isTyping && (
            <div className="flex gap-4">
              <div className="w-8 h-8 rounded-lg bg-accent/20 flex items-center justify-center shrink-0"><I.Sparkles /></div>
              <div className="bg-surface-elevated border border-border rounded-2xl px-5 py-3">
                <div className="flex gap-1">
                  <div className="w-2 h-2 rounded-full bg-text-tertiary animate-bounce" style={{ animationDelay: '0ms' }} />
                  <div className="w-2 h-2 rounded-full bg-text-tertiary animate-bounce" style={{ animationDelay: '150ms' }} />
                  <div className="w-2 h-2 rounded-full bg-text-tertiary animate-bounce" style={{ animationDelay: '300ms' }} />
                </div>
              </div>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>
      </div>

      <div className="border-t border-border p-4">
        <div className="max-w-3xl mx-auto">
          <div className="flex gap-2 mb-3 overflow-x-auto pb-1">
            {suggestions.map((s, i) => (
              <button key={i} onClick={() => { setInput(s); }} className="px-3 py-1.5 rounded-full bg-surface-elevated border border-border text-xs text-text-secondary hover:text-text-primary hover:border-border-hover transition-all whitespace-nowrap">
                {s}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-3 bg-surface-elevated border border-border rounded-xl px-4 py-3 focus-within:border-accent transition-colors">
            <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSend()} placeholder="Ask me anything about your work..." className="flex-1 bg-transparent text-sm outline-none placeholder:text-text-tertiary" />
            <button onClick={handleSend} className="w-8 h-8 rounded-lg bg-accent hover:bg-accent-hover flex items-center justify-center text-white transition-colors"><I.Send /></button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── Vision Board ───
const VisionBoardView = () => {
  const [items, setItems] = useState(VISION_ITEMS);
  const [newItem, setNewItem] = useState('');
  const [category, setCategory] = useState('goal');

  const addItem = () => {
    if (!newItem.trim()) return;
    const colors = ['#5e6ad2', '#98c379', '#e5c07b', '#e06c75'];
    setItems(prev => [...prev, { id: Date.now(), title: newItem, category, color: colors[Math.floor(Math.random() * colors.length)] }]);
    setNewItem('');
  };

  const removeItem = (id) => setItems(prev => prev.filter(i => i.id !== id));

  const categories = {
    goal: { label: 'Goals', icon: <I.Target /> },
    idea: { label: 'Ideas', icon: <I.Lightbulb /> },
    inspiration: { label: 'Inspiration', icon: <I.Star /> },
  };

  return (
    <div className="p-8 max-w-6xl mx-auto animate-fadeIn">
      <div className="flex items-center justify-between mb-8">
        <div>
          <h1 className="text-2xl font-semibold tracking-tight mb-1">Vision Board</h1>
          <p className="text-text-secondary text-sm">Capture your goals, ideas, and inspiration in one place.</p>
        </div>
      </div>

      <div className="flex gap-3 mb-8">
        <input type="text" value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key === 'Enter' && addItem()} placeholder="Add a new goal, idea, or inspiration..." className="flex-1 bg-surface-elevated border border-border rounded-xl px-4 py-3 text-sm outline-none focus:border-accent placeholder:text-text-tertiary" />
        <select value={category} onChange={e => setCategory(e.target.value)} className="bg-surface-elevated border border-border rounded-xl px-4 py-3 text-sm outline-none focus:border-accent text-text-secondary">
          <option value="goal">Goal</option>
          <option value="idea">Idea</option>
          <option value="inspiration">Inspiration</option>
        </select>
        <button onClick={addItem} className="px-5 py-3 bg-accent hover:bg-accent-hover text-white rounded-xl text-sm font-medium transition-colors flex items-center gap-2">
          <I.Plus /> Add
        </button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
        {Object.entries(categories).map(([cat, info]) => (
          <div key={cat}>
            <div className="flex items-center gap-2 mb-4">
              <span className="text-text-secondary">{info.icon}</span>
              <h2 className="text-sm font-semibold uppercase tracking-wider">{info.label}</h2>
              <span className="text-xs text-text-tertiary bg-white/5 px-2 py-0.5 rounded-full">{items.filter(i => i.category === cat).length}</span>
            </div>
            <div className="space-y-3">
              {items.filter(i => i.category === cat).map(item => (
                <div key={item.id} className="bg-surface-elevated rounded-xl border border-border p-4 hover:border-border-hover transition-colors group relative">
                  <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onClick={() => removeItem(item.id)} className="text-text-tertiary hover:text-red-400"><I.X /></button>
                  </div>
                  <div className="w-1 h-full absolute left-0 top-0 rounded-l-xl" style={{ backgroundColor: item.color }} />
                  <p className="text-sm font-medium pl-2">{item.title}</p>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── Meetings ───
const MeetingsView = () => {
  const [selectedNote, setSelectedNote] = useState(null);

  return (
    <div className="flex flex-col h-full animate-fadeIn">
      <div className="h-14 flex items-center justify-between px-6 border-b border-border shrink-0">
        <h1 className="text-lg font-semibold">Meeting Notes</h1>
        <button className="flex items-center gap-2 px-3 py-1.5 bg-accent hover:bg-accent-hover text-white rounded-lg text-xs font-medium transition-colors">
          <I.Plus /> New Note
        </button>
      </div>
      <div className="flex-1 flex overflow-hidden">
        <div className="w-80 border-r border-border overflow-auto">
          {MEETING_NOTES.map(note => (
            <button key={note.id} onClick={() => setSelectedNote(note)} className={`w-full text-left px-5 py-4 border-b border-border/50 hover:bg-white/[0.02] transition-colors ${selectedNote?.id === note.id ? 'bg-accent/5 border-l-2 border-l-accent' : ''}`}>
              <div className="text-sm font-medium mb-1">{note.title}</div>
              <div className="flex items-center gap-2 text-[11px] text-text-tertiary">
                <span>{note.date}</span>
                <span>·</span>
                <span>{PROJECTS.find(p => p.id === note.project)?.name}</span>
              </div>
            </button>
          ))}
        </div>
        <div className="flex-1 overflow-auto p-8">
          {selectedNote ? (
            <div className="max-w-2xl">
              <div className="flex items-center gap-3 mb-6">
                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: PROJECTS.find(p => p.id === selectedNote.project)?.color }} />
                <span className="text-sm text-text-secondary">{PROJECTS.find(p => p.id === selectedNote.project)?.name}</span>
                <span className="text-sm text-text-tertiary">·</span>
                <span className="text-sm text-text-tertiary">{selectedNote.date}</span>
              </div>
              <h2 className="text-xl font-semibold mb-4">{selectedNote.title}</h2>
              <div className="text-sm text-text-secondary leading-relaxed whitespace-pre-line">{selectedNote.content}</div>
              <div className="mt-8 pt-6 border-t border-border">
                <h3 className="text-xs font-semibold uppercase tracking-wider text-text-tertiary mb-3">Linked Tasks</h3>
                <div className="space-y-2">
                  {INITIAL_TASKS.filter(t => t.project === selectedNote.project).slice(0, 3).map(task => (
                    <div key={task.id} className="flex items-center gap-3 px-4 py-3 bg-surface-elevated rounded-lg border border-border">
                      <I.CheckSquare />
                      <span className="text-sm">{task.title}</span>
                      <PriorityBadge priority={task.priority} />
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <div className="h-full flex items-center justify-center text-text-tertiary">
              <div className="text-center">
                <I.FileText />
                <p className="mt-2 text-sm">Select a meeting note to view details</p>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── Notes ───
const NotesView = () => {
  const [notes, setNotes] = useState(PERSONAL_NOTES);
  const [selectedNote, setSelectedNote] = useState(PERSONAL_NOTES[0]);
  const [editContent, setEditContent] = useState(PERSONAL_NOTES[0]?.content || '');

  useEffect(() => {
    if (selectedNote) setEditContent(selectedNote.content);
  }, [selectedNote]);

  const saveNote = () => {
    setNotes(prev => prev.map(n => n.id === selectedNote.id ? { ...n, content: editContent, updated: 'Just now' } : n));
  };

  return (
    <div className="flex flex-col h-full animate-fadeIn">
      <div className="h-14 flex items-center justify-between px-6 border-b border-border shrink-0">
        <h1 className="text-lg font-semibold">Personal Notes</h1>
        <button className="flex items-center gap-2 px-3 py-1.5 bg-accent hover:bg-accent-hover text-white rounded-lg text-xs font-medium transition-colors">
          <I.Plus /> New Note
        </button>
      </div>
      <div className="flex-1 flex overflow-hidden">
        <div className="w-72 border-r border-border overflow-auto">
          {notes.map(note => (
            <button key={note.id} onClick={() => setSelectedNote(note)} className={`w-full text-left px-5 py-4 border-b border-border/50 hover:bg-white/[0.02] transition-colors ${selectedNote?.id === note.id ? 'bg-accent/5' : ''}`}>
              <div className="text-sm font-medium mb-1">{note.title}</div>
              <div className="text-[11px] text-text-tertiary">{note.updated}</div>
            </button>
          ))}
        </div>
        <div className="flex-1 overflow-auto p-8">
          {selectedNote && (
            <div className="max-w-3xl mx-auto">
              <input type="text" value={selectedNote.title} className="w-full bg-transparent text-xl font-semibold outline-none mb-4" readOnly />
              <textarea
                value={editContent}
                onChange={e => setEditContent(e.target.value)}
                onBlur={saveNote}
                className="w-full h-[60vh] bg-transparent text-sm text-text-secondary leading-relaxed outline-none resize-none"
              />
              <div className="flex items-center justify-between mt-4 pt-4 border-t border-border">
                <span className="text-[11px] text-text-tertiary">Last edited {selectedNote.updated}</span>
                <button onClick={saveNote} className="px-3 py-1.5 bg-accent/10 text-accent hover:bg-accent/20 rounded-lg text-xs font-medium transition-colors">Save</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── Calendar ───
const CalendarView = () => {
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const hours = Array.from({ length: 12 }, (_, i) => i + 8);

  return (
    <div className="flex flex-col h-full animate-fadeIn">
      <div className="h-14 flex items-center justify-between px-6 border-b border-border shrink-0">
        <div className="flex items-center gap-4">
          <h1 className="text-lg font-semibold">Calendar</h1>
          <div className="flex items-center gap-2">
            <button className="p-1.5 rounded-lg hover:bg-white/5 text-text-tertiary"><I.ChevronDown /></button>
            <span className="text-sm font-medium">July 2026</span>
            <button className="p-1.5 rounded-lg hover:bg-white/5 text-text-tertiary rotate-180"><I.ChevronDown /></button>
          </div>
        </div>
        <button className="flex items-center gap-2 px-3 py-1.5 bg-accent hover:bg-accent-hover text-white rounded-lg text-xs font-medium transition-colors">
          <I.Plus /> New Event
        </button>
      </div>
      <div className="flex-1 overflow-auto">
        <div className="min-w-max">
          <div className="grid grid-cols-8 border-b border-border">
            <div className="p-3 text-xs text-text-tertiary font-medium">Time</div>
            {days.map(day => (
              <div key={day} className="p-3 text-xs text-text-secondary font-medium text-center">{day}</div>
            ))}
          </div>
          {hours.map(hour => (
            <div key={hour} className="grid grid-cols-8 border-b border-border/50">
              <div className="p-3 text-[11px] text-text-tertiary">{hour}:00</div>
              {days.map((day, dayIdx) => {
                const event = CALENDAR_EVENTS.find(e => {
                  const eventHour = parseInt(e.time.split(':')[0]);
                  return e.day === dayIdx + 1 && eventHour === hour;
                });
                return (
                  <div key={day} className="p-1 min-h-[60px] border-l border-border/30 relative">
                    {event && (
                      <div className="absolute inset-1 rounded-lg px-2 py-1 text-[11px] font-medium text-white overflow-hidden" style={{ backgroundColor: event.color + 'cc', height: `${(event.duration / 60) * 60 - 4}px` }}>
                        {event.title}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── Main App ───
const App = () => {
  const [activeView, setActiveView] = useState('dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [searchOpen, setSearchOpen] = useState(false);
  const [notificationsOpen, setNotificationsOpen] = useState(false);

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'k' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        setSearchOpen(true);
      }
      if (e.key === 'Escape') {
        setSearchOpen(false);
        setNotificationsOpen(false);
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, []);

  const renderView = () => {
    switch (activeView) {
      case 'dashboard': return <DashboardView setActiveView={setActiveView} />;
      case 'projects': return <ProjectsView />;
      case 'tasks': return <TasksView />;
      case 'ai': return <AIAssistantView />;
      case 'vision': return <VisionBoardView />;
      case 'meetings': return <MeetingsView />;
      case 'notes': return <NotesView />;
      case 'calendar': return <CalendarView />;
      default: return <DashboardView setActiveView={setActiveView} />;
    }
  };

  return (
    <div className="flex h-screen bg-surface-base">
      <Sidebar activeView={activeView} setActiveView={setActiveView} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} />
      <div className="flex-1 flex flex-col min-w-0">
        <header className="h-14 flex items-center justify-between px-6 border-b border-border shrink-0 bg-surface-panel/50 backdrop-blur-sm">
          <div className="flex items-center gap-4">
            <button onClick={() => setSearchOpen(true)} className="flex items-center gap-2 px-3 py-1.5 bg-surface-elevated border border-border rounded-lg text-xs text-text-tertiary hover:text-text-secondary hover:border-border-hover transition-colors">
              <I.Search />
              <span>Search</span>
              <kbd className="px-1.5 py-0.5 rounded bg-white/5 text-[10px] border border-white/5 ml-2">⌘K</kbd>
            </button>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={() => setNotificationsOpen(true)} className="relative p-2 rounded-lg text-text-tertiary hover:text-text-secondary hover:bg-white/[0.03] transition-colors">
              <I.Bell />
              <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-accent" />
            </button>
            <button className="p-2 rounded-lg text-text-tertiary hover:text-text-secondary hover:bg-white/[0.03] transition-colors">
              <I.Settings />
            </button>
            <div className="w-px h-6 bg-border mx-1" />
            <Avatar user="u1" size="md" />
          </div>
        </header>
        <main className="flex-1 overflow-auto">
          {renderView()}
        </main>
      </div>
      <SearchOverlay isOpen={searchOpen} onClose={() => setSearchOpen(false)} />
      <NotificationsPanel isOpen={notificationsOpen} onClose={() => setNotificationsOpen(false)} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
